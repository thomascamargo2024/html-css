<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>positions</title>
    <style>
        .position{
            height: 100px;
            width: 500px;
            border: 1px solid black;
            border-radius: 10px;
            margin: 10px;
        }
        #img1{
            background-image: url(wallpaper002.jpg);
            background-position: top left;
        }
        #img2{
            background-image: url(wallpaper002.jpg);
            background-position: top right;

        }
        #img3{
            background-image: url(wallpaper002.jpg);
            background-position: center center;

        }
        #img4{
            background-image: url(wallpaper002.jpg);
            background-position: left bottom;

        }

    </style>
</head>
<body>
    <div class="position" id="img1">

    </div>
    <div class="position" id="img2">
        
    </div>
    <div class="position" id="img3">
        
    </div>
    <div class="position" id="img4">
        
    </div>
</body>
</html>
